###########################################################
### Space Mission Design Lab - Beautiful Jekyll Config
###########################################################

############################
# --- Required options --- #
############################

# Name of website
title: Space Mission Design Lab

# Name to show in the footer
author: Space Mission Design Lab

# Website URL
url: "https://smd-lab.github.io"
baseurl: ""

# Site description
description: Research on astrodynamics, space mission design, trajectory optimization, and AI-based autonomous GNC for deep-space missions.

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Research: "research"
  Projects: "projects"
  Publications: "publications"
  About: "aboutme"
  GitHub: "https://github.com/smd-lab"

################
# --- Logo --- #
################

# Image to show in the navigation bar - works best with a square image
avatar: "/assets/img/smd_lab_clean_512_github_profile.jpg"

# By default, the image is cut into a circle
round-avatar: true

# If you want to use an image logo instead of the website title, uncomment this line
# title-img: "/assets/img/smd_lab_clean_512_github_profile.jpg"

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  github: smd-lab
#  email: "your-email@example.com"
#  ORCID: "your-orcid-id"
#  google-scholar: "your-google-scholar-id"
#  linkedin: "your-linkedin-id"

# If you want your website to generate an RSS feed, provide a description
rss-description: Research updates from the Space Mission Design Lab

###########################
# --- General options --- #
###########################

# Select which social network share links to show in posts
share-links-active:
  twitter: false
  facebook: false
  linkedin: true
  vk: false
  reddit: false

# How to display the link to your website in the footer
url-pretty: "smd-lab.github.io"

# Add the website title to the title of every page
title-on-all-pages: true

# Excerpt word length
excerpt_length: 50

# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: true

# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: true

# Add a search button to the navbar
post_search: true

# Add a button in the footer to edit the current page
edit_page_button: true

# Allow longer second-level navigation menu items
navbar-var-length: false

# Keywords for SEO
keywords: "astrodynamics, space mission design, trajectory optimization, AI-based autonomous GNC, deep-space missions, space exploration, mission analysis, guidance navigation control, lunar mission, Mars mission, autonomous navigation"

######################################
# --- Colours / background image --- #
######################################

# Main colors
page-col: "#FFFFFF"
text-col: "#303030"
link-col: "#0077CC"
hover-col: "#00A6D6"

# Navigation bar colors
navbar-col: "#06111F"
navbar-text-col: "#FFFFFF"
navbar-border-col: "#1E5AA8"

# Footer colors
footer-col: "#06111F"
footer-text-col: "#B8C7D9"
footer-link-col: "#FFFFFF"
footer-hover-col: "#00A6D6"

# Mobile browser theme color
mobile-theme-col: "#06111F"

# Optional background images
# navbar-img: "/assets/img/bgimage.png"
# footer-img: "/assets/img/bgimage.png"
# page-img: "/assets/img/bgimage.png"

# Optional custom CSS
# site-css:
#   - "/assets/css/custom-styles.css"

# Optional custom JavaScript
# site-js:
#   - "/assets/js/custom-script.js"

#################################
# --- Web Analytics Section --- #
#################################

# Google Analytics 4 Measurement ID
# gtag: "G-XXXXXXXXXX"

# Cloudflare Analytics
# cloudflare_analytics: ""

# Google Tag Manager ID
# gtm: ""

####################
# --- Comments --- #
####################

# Disqus comments
# disqus: ""

# Facebook comments
# fb_comment_id: ""

# CommentBox comments
# commentbox: ""

# Utterances comments
# utterances:
#   repository: "smd-lab/smd-lab.github.io"
#   issue-term: title
#   theme: github-light
#   label: blog-comments

# Giscus comments
# giscus:
#   hostname: giscus.app
#   repository: "smd-lab/smd-lab.github.io"
#   repository-id:
#   category: Announcements
#   category-id:
#   mapping: pathname
#   reactions-enabled: 1
#   emit-metadata: 0
#   theme: light

################
# --- Misc --- #
################

# Date format for posts
date_format: "%B %-d, %Y"

# Facebook App ID
# fb_app_id: ""

#################################################################################
# --- You don't need to touch anything below here unless necessary --- #
#################################################################################

# Output options
timezone: "Asia/Seoul"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

# Default YAML values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

# Beautiful Jekyll configuration for Space Mission Design Lab
